<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zendesk-app</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #242424; font-size: 14px; padding: 16px; }
:root {
  --ct:#242424; --cs:#616161; --c3:#8a8a8a;
  --ci:#0f6cbd; --cg:#107c10; --cw:#835b00; --cd:#c4314b;
  --bg2:#f5f5f5; --bg3:#ebebeb;
  --bgi:#cce4f7; --bgg:#dff6dd; --bgw:#fff4ce; --bgd:#fde7ea;
  --bd2:#d1d1d1; --bd3:#e0e0e0; --bdi:#0f6cbd;
  --rm:4px; --rl:8px;
}
@media (prefers-color-scheme:dark){
  body{background:#1f1f1f;color:#fff;}
  :root{--ct:#fff;--cs:#ababab;--c3:#747474;--bg2:#2d2d2d;--bg3:#3d3d3d;--bd2:#484848;--bd3:#3d3d3d;}
}
select,input[type="date"],input[type="text"]{border:1px solid var(--bd2);border-radius:var(--rm);padding:6px 8px;font-size:13px;background:#fff;color:var(--ct);width:100%;}
@media (prefers-color-scheme:dark){select,input[type="date"],input[type="text"]{background:#2d2d2d;color:#fff;border-color:#484848;}}
button{border:1px solid var(--bd2);border-radius:var(--rm);padding:6px 14px;font-size:13px;cursor:pointer;background:#fff;color:var(--ct);}
button:hover{background:var(--bg2);}
.bp{background:#6264a7;color:#fff;border-color:#6264a7;}
.bp:hover{background:#4f52a3;}
@media (prefers-color-scheme:dark){button{background:#2d2d2d;color:#fff;}}
.hidden{display:none;}
.note{font-size:11px;color:var(--c3);margin-top:8px;}

/* 업로드 */
.upload-card{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:1.25rem 1rem;text-align:center;cursor:pointer;background:var(--bg2);transition:background 0.15s;margin-bottom:1.25rem;}
.upload-card:hover,.upload-card.dragover{background:var(--bg3);}
.uc-label{font-size:12px;font-weight:600;color:var(--cs);margin-bottom:4px;}
.uc-sub{font-size:11px;color:var(--c3);}
.uc-ok{font-size:11px;color:var(--cg);margin-top:4px;font-weight:500;}

/* 탭 */
.tabs{display:flex;border-bottom:0.5px solid var(--bd3);margin-bottom:1.25rem;}
.tb{padding:8px 18px;font-size:13px;font-weight:500;color:var(--cs);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;}
.tb:hover{color:var(--ct);}
.tb.active{color:var(--ct);border-bottom-color:#6264a7;}
.tp{display:none;}
.tp.active{display:block;}

/* 필터 */
.fr{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin:1.25rem 0;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px;}
.fl{font-size:12px;color:var(--cs);}

/* 집계 테이블 (티켓) */
.ctw{overflow-x:auto;border:0.5px solid var(--bd3);border-radius:var(--rl);margin-top:1rem;}
.ct{width:100%;border-collapse:collapse;font-size:13px;}
.ct thead th{position:sticky;top:0;z-index:2;background:var(--bg2);color:var(--cs);font-weight:500;padding:9px 14px;border-bottom:0.5px solid var(--bd3);white-space:nowrap;text-align:left;}
.ct thead th.num{text-align:right;}
.ct tbody tr{border-bottom:0.5px solid var(--bd3);cursor:pointer;transition:background 0.1s;}
.ct tbody tr:last-child{border-bottom:none;}
.ct tbody tr:hover{background:var(--bg2);}
.ct tbody tr.active{background:var(--bg2);outline:1px solid var(--bdi) inset;}
.ct tbody tr.trow{font-weight:600;background:var(--bg2);cursor:default;}
.ct tbody td{padding:9px 14px;}
.ct tbody td.num{text-align:right;font-variant-numeric:tabular-nums;}
.zd-source-tabs{display:flex;gap:0;margin-bottom:1rem;border:1px solid var(--bd2);border-radius:var(--rm);overflow:hidden;}
.zd-src-btn{flex:1;padding:8px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:none;border:none;color:var(--cs);transition:all 0.15s;}
.zd-src-btn.active{background:#6264a7;color:#fff;}
.zd-src-btn:not(.active):hover{background:var(--bg3);}
.zd-api-box{background:var(--bg2);border-radius:var(--rl);padding:1rem;margin-bottom:1rem;}
.zd-api-status{font-size:12px;margin-top:10px;padding:8px 12px;border-radius:var(--rm);display:none;}
.zd-api-status.ok{background:var(--bgg);color:var(--cg);display:block;}
.zd-api-status.err{background:var(--bgd);color:var(--cd);display:block;}
.zd-api-status.loading{background:var(--bgi);color:var(--ci);display:block;}

/* 주 선택 달력 */
.week-picker-wrap{position:relative;display:inline-block;width:100%;}
.week-picker-input{border:1px solid var(--bd2);border-radius:var(--rm);padding:6px 8px;font-size:13px;background:#fff;color:var(--ct);width:100%;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;}
@media (prefers-color-scheme:dark){.week-picker-input{background:#2d2d2d;color:#fff;border-color:#484848;}}
.week-picker-dropdown{position:absolute;top:calc(100% + 4px);left:0;z-index:100;background:#fff;border:1px solid var(--bd2);border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,0.12);min-width:280px;padding:12px;}
@media (prefers-color-scheme:dark){.week-picker-dropdown{background:#2d2d2d;border-color:#484848;}}
.wp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wp-title{font-size:13px;font-weight:600;color:var(--ct);}
.wp-nav{background:none;border:1px solid var(--bd2);border-radius:var(--rm);padding:2px 8px;cursor:pointer;font-size:13px;color:var(--ct);}
.wp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.wp-dow{text-align:center;font-size:10px;color:var(--cs);padding:3px 0;font-weight:500;}
.wp-day{text-align:center;font-size:12px;padding:5px 2px;border-radius:3px;cursor:pointer;transition:background 0.1s;}
.wp-day:hover{background:var(--bg3);}
.wp-day.other-month{opacity:0.3;}
.wp-day.in-week{background:var(--bgi);color:var(--ci);}
.wp-day.week-start{border-radius:99px 0 0 99px;background:#6264a7;color:#fff!important;}
.wp-day.week-end{border-radius:0 99px 99px 0;background:#6264a7;color:#fff!important;}
.wp-day.in-week.other-month{opacity:0.5;}
.wp-clear{margin-top:8px;text-align:right;}
.wp-clear button{font-size:11px;padding:3px 10px;color:var(--cs);}
/* 주별/일별 탭 */
.wk-filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
.wk-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.wk-card{background:var(--bg2);border-radius:var(--rm);padding:0.85rem 1rem;}
.wk-card-label{font-size:11px;color:var(--cs);margin-bottom:4px;}
.wk-card-value{font-size:20px;font-weight:500;}
/* 달력 */
.cal-wrap{margin-bottom:1.25rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-title{font-size:14px;font-weight:600;}
.cal-nav{background:none;border:1px solid var(--bd2);border-radius:var(--rm);padding:3px 10px;cursor:pointer;font-size:13px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:11px;color:var(--cs);padding:4px 0;font-weight:500;}
.cal-day{text-align:center;font-size:12px;padding:6px 2px;border-radius:var(--rm);cursor:pointer;transition:background 0.1s;position:relative;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-day:hover{background:var(--bg3);}
.cal-day.has-data{background:var(--bgi);color:var(--ci);}
.cal-day.has-data:hover{background:#b3d7f0;}
.cal-day.selected{background:#6264a7!important;color:#fff!important;}
.cal-day.today{font-weight:700;}
.cal-day.other-month{opacity:0.3;}
.cal-day-num{font-size:12px;line-height:1;}
.cal-day-h{font-size:9px;color:inherit;opacity:0.85;}
/* 시간대 바 */
.hour-bars{display:flex;gap:3px;align-items:flex-end;height:80px;margin-bottom:4px;}
.hour-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hour-bar{width:100%;background:var(--bgi);border-radius:2px 2px 0 0;min-height:2px;}
.hour-bar-label{font-size:9px;color:var(--c3);}
.hour-bar-count{font-size:9px;color:var(--ci);}
/* 월별 사이트 상세 패널 */
.mo-dp{margin-top:0;border-top:none;border:0.5px solid var(--bd3);border-top:none;border-radius:0 0 var(--rl) var(--rl);overflow:hidden;}
.mtw table tbody tr.mo-active{background:var(--bgi)!important;outline:1px solid var(--bdi) inset;}
.mtw table tbody tr.clickable{cursor:pointer;}
.mtw table tbody tr.clickable:hover td{background:var(--bg2);}
.mo-detail-wrap{overflow-x:auto;max-height:280px;overflow-y:auto;}
.mo-detail-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg2);border-bottom:0.5px solid var(--bd3);}
.mo-detail-title{font-size:12px;font-weight:500;color:var(--ct);}
.mo-detail-close{background:none;border:none;cursor:pointer;font-size:14px;padding:0;color:var(--cs);}
.cb{display:inline-block;min-width:28px;text-align:center;padding:1px 8px;border-radius:99px;font-size:12px;font-weight:500;}
.cbp{background:var(--bgg);color:var(--cg);}
.cbt{background:var(--bgi);color:var(--ci);}
.cbr{background:var(--bgw);color:var(--cw);}
.cb0{color:var(--c3);}

/* 시스템 유형 뱃지 */
.sb{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.ss{background:#e0f2fe;color:#0369a1;}   /* 단독형 */
.sp2{background:#fef3c7;color:#92400e;}  /* 유상 */
.sc{background:#f0fdf4;color:#166534;}   /* 공유형 */
.sd{background:#f3e8ff;color:#7c3aed;}   /* 구독관리 */

/* 상세 패널 */
.dp{margin-top:1rem;border:0.5px solid var(--bd3);border-radius:var(--rl);overflow:hidden;}
.dh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-bottom:0.5px solid var(--bd3);}
.dt2{font-size:13px;font-weight:500;}
.ds{font-size:12px;color:var(--cs);}
.dc2{background:none;border:none;cursor:pointer;font-size:16px;padding:0;line-height:1;color:var(--cs);}
.dtw{overflow-x:auto;max-height:300px;overflow-y:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt thead th{position:sticky;top:0;background:var(--bg2);color:var(--cs);font-weight:500;text-align:left;padding:7px 12px;border-bottom:0.5px solid var(--bd3);white-space:nowrap;}
table.dt tbody tr{border-bottom:0.5px solid var(--bd3);}
table.dt tbody tr:hover{background:var(--bg2);}
table.dt tbody td{padding:7px 12px;}
table.dt tbody td.tc{max-width:300px;white-space:normal;word-break:break-all;line-height:1.4;}
table.dt tbody td.dc{white-space:nowrap;}
.stp{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;}
.dtabs{display:flex;border-bottom:0.5px solid var(--bd3);background:var(--bg2);}
.dtab{padding:6px 14px;font-size:12px;font-weight:500;color:var(--cs);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;}
.dtab.active{color:var(--ct);border-bottom-color:#6264a7;}

/* 월별 탭 */

.mc{background:var(--bg2);border-radius:var(--rm);padding:0.85rem 1rem;}
.mcl{font-size:11px;color:var(--cs);margin-bottom:4px;}

.mtw table thead th.num{text-align:right;}
.mtw table tbody tr{border-bottom:0.5px solid var(--bd3);}
.mtw table tbody tr:hover{background:var(--bg2);}
.mtw table tbody tr.sum-row{font-weight:600;background:var(--bg2);}
.mtw table tbody td{padding:7px 12px;white-space:nowrap;}

.wp-day.in-week{background:var(--bgi);color:var(--ci);}
.wp-day.week-start{border-radius:99px 0 0 99px;background:#6264a7;color:#fff!important;}
.wp-day.week-end{border-radius:0 99px 99px 0;background:#6264a7;color:#fff!important;}
.wp-day.in-week.other-month{opacity:0.5;}
.wp-clear{margin-top:8px;text-align:right;}
.wp-clear button{font-size:11px;padding:3px 10px;color:var(--cs);}
/* 주별/일별 탭 */
.wk-filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
.wk-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.wk-card{background:var(--bg2);border-radius:var(--rm);padding:0.85rem 1rem;}
.wk-card-label{font-size:11px;color:var(--cs);margin-bottom:4px;}
.wk-card-value{font-size:20px;font-weight:500;}
/* 달력 */
.cal-wrap{margin-bottom:1.25rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-title{font-size:14px;font-weight:600;}
.cal-nav{background:none;border:1px solid var(--bd2);border-radius:var(--rm);padding:3px 10px;cursor:pointer;font-size:13px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:11px;color:var(--cs);padding:4px 0;font-weight:500;}
.cal-day{text-align:center;font-size:12px;padding:6px 2px;border-radius:var(--rm);cursor:pointer;transition:background 0.1s;position:relative;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-day:hover{background:var(--bg3);}
.cal-day.has-data{background:var(--bgi);color:var(--ci);}
.cal-day.has-data:hover{background:#b3d7f0;}
.cal-day.selected{background:#6264a7!important;color:#fff!important;}
.cal-day.today{font-weight:700;}
.cal-day.other-month{opacity:0.3;}
.cal-day-num{font-size:12px;line-height:1;}
.cal-day-h{font-size:9px;color:inherit;opacity:0.85;}
/* 시간대 바 */
.hour-bars{display:flex;gap:3px;align-items:flex-end;height:80px;margin-bottom:4px;}
.hour-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hour-bar{width:100%;background:var(--bgi);border-radius:2px 2px 0 0;min-height:2px;}
.hour-bar-label{font-size:9px;color:var(--c3);}
.hour-bar-count{font-size:9px;color:var(--ci);}
/* 월별 사이트 상세 패널 */
.mo-dp{margin-top:0;border-top:none;border:0.5px solid var(--bd3);border-top:none;border-radius:0 0 var(--rl) var(--rl);overflow:hidden;}
.mtw table tbody tr.mo-active{background:var(--bgi)!important;outline:1px solid var(--bdi) inset;}
.mtw table tbody tr.clickable{cursor:pointer;}
.mtw table tbody tr.clickable:hover td{background:var(--bg2);}
.mo-detail-wrap{overflow-x:auto;max-height:280px;overflow-y:auto;}
.mo-detail-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg2);border-bottom:0.5px solid var(--bd3);}
.mo-detail-title{font-size:12px;font-weight:500;color:var(--ct);}
.mo-detail-close{background:none;border:none;cursor:pointer;font-size:14px;padding:0;color:var(--cs);}
</style>

// ID 기준으로 사이트/조직/대상시스템 보정 (2026-04 이전 데이터)
function applyIdMapping(row) {
  const id = parseInt(row['ID']||row[' ID']||0);

  // ── 설정 시트 규칙 우선 적용 ─────────────────────────
  const setting = id ? findSetting(id) : null;
  if(setting) {
    const parsed = parseSettingRule(setting.rule);
    if(parsed.type === 'split') {
      // 월별 시간 지정 분할
      return {...row, '_split_rules': parsed.splits};
    }
    if(parsed.type === 'split_days') {
      return {...row, '_split_days': {month: parsed.month, days: parsed.days}};
    }
    if(parsed.type === 'split_weekdays') {
      // 요청일부터 평일 N일로 균등 분할
      return {...row, '_split_weekdays': parsed.days};
    }
    if(parsed.type === 'reclassify') {
      // 사이트 재분류
      return {...row, '사이트': parsed.site, '조직': parsed.site};
    }
  }

  // ── 일반 ID 매핑 (2026-04 이전 데이터) ───────────────
  const m = id && ID_MAP[id] ? ID_MAP[id] : null;
  if (!m) return row;
  const updDate = row['업데이트 시간'] ? new Date(String(row['업데이트 시간']).slice(0,10)) : null;
  const isOldData = !updDate || (updDate.getFullYear()*100 + updDate.getMonth()+1) < 202604;
  if (isOldData) {
    return {...row, '사이트': m.s, '조직': m.o, '대상시스템': m.d};
  }
  return row;
}

function switchZdSource(type, btn) {

function zdOAuthLogin() {
  if (zdAccessToken) { zdLoadTickets(); return; }
  // state 저장
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('zd_oauth_state', state);
  // Authorization Code flow URL
  const authUrl = `https://${ZD_SUBDOMAIN}.zendesk.com/oauth/authorizations/new`
    + `?response_type=code`
    + `&client_id=${ZD_CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(ZD_REDIRECT)}`
    + `&scope=${ZD_SCOPE}`
    + `&state=${state}`;
  // 팝업
  const popup = window.open(authUrl, 'zd_oauth', 'width=600,height=700,left=300,top=100');
  // postMessage로 토큰 수신
  const handler = async (e) => {
    if (!e.data || !e.data.zd_code) return;
    window.removeEventListener('message', handler);
    if (e.data.zd_state !== sessionStorage.getItem('zd_oauth_state')) {
      setZdStatus('err', '보안 오류: state 불일치'); return;
    }
    // code → token (Azure Function 경유)
    setZdStatus('loading', '토큰 교환 중...');
    try {
      const res = await fetch(`${ZD_API_BASE}?code=${e.data.zd_code}`);
      const json = await res.json();
      if (!json.access_token) throw new Error(json.error || '토큰 발급 실패');
      zdAccessToken = json.access_token;
      sessionStorage.setItem('zd_token', zdAccessToken);
      zdLoadTickets();
    } catch(err) {
      setZdStatus('err', '토큰 교환 실패: ' + err.message);
      resetLoginBtn();
    }
  };
  window.addEventListener('message', handler);
}

// OAuth 콜백 페이지에서 code를 부모에게 전달
(function checkOAuthCallback() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code'), state = params.get('state');
  if (code && window.opener) {
    window.opener.postMessage({ zd_code: code, zd_state: state }, '*');
    window.close();
  }
})();

async function zdLoadTickets() {
  const btn = document.getElementById('btn-zd-login');
  btn.disabled = true;
  btn.textContent = '불러오는 중...';
  setZdStatus('loading', '티켓 불러오는 중...');
  try {
    const res = await fetch(`${ZD_API_BASE}?token=${zdAccessToken}`);
    if (res.status === 401) {
      zdAccessToken = '';
      sessionStorage.removeItem('zd_token');
      setZdStatus('err', '토큰 만료 — 다시 로그인해주세요.');
      resetLoginBtn(); return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = json.tickets || [];
    if (!rows.length) throw new Error('티켓이 없습니다.');

    ZC = Object.keys(rows[0]);
    ZR = rows.map(r => applyIdMapping(r));
    setZdStatus('ok', `✓ ${rows.length}건 로드 완료`);
    btn.textContent = `✓ ${rows.length}건 (다시 불러오기)`;
    btn.disabled = false;
    setupAfterLoad(`Zendesk API (${rows.length}건)`);
  } catch(e) {
    setZdStatus('err', '불러오기 실패: ' + e.message);
    resetLoginBtn();
  }
}

let SETTINGS = []; // [{id, rule, raw}]

function parseSettings(wb) {
  // '설정' 시트 찾기
  const settingSheet = wb.SheetNames.find(n => n.includes('설정') || n.toLowerCase()==='settings');
  if(!settingSheet) return;
  const ws = wb.Sheets[settingSheet];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
  if(rows.length < 2) return;
  // 헤더 제외, 데이터 행 파싱
  SETTINGS = [];
  for(let i=1; i<rows.length; i++){
    const row = rows[i];
    const id = parseInt(String(row[0]||'').trim()) || null;
    const desc = String(row[1]||'').trim();
    const rule = String(row[2]||'').trim();
    if(!id && !desc) continue;
    SETTINGS.push({id, desc, rule});
  }
  console.log('설정 로드:', SETTINGS.length, '건', SETTINGS);
}

// 설정 규칙 파싱 - 수정내용 텍스트 해석
function parseSettingRule(rule) {
  if(!rule) return {type:'unknown'};

  // ── 패턴 0: 요청일부터 평일 N일로 균등 분할 ─────────────
  // 예: "평일 3일로 나누기" / "평일 5일 균등" / "3 평일로 분할"
  const weekdayRe = /(?:평일\s*(\d+)|(\d+)\s*평일)\s*(?:일\s*)?(?:로|으로|동안|에\s*걸쳐)?\s*(?:나누기|분할|균등)/;
  const wdm = rule.match(weekdayRe);
  if(wdm) {
    const days = parseInt(wdm[1]||wdm[2]);
    if(days > 0) return {type:'split_weekdays', days};
  }

  // ── 패턴 1: 특정 날짜들로 균등 분할 ───────────────────
  // 예: "6월 8,9,10,11,15일로 시간 동일하게 나누기"
  // 예: "6월 8,9,10일 균등 분할"
  const dayEqualRe = /(\d{1,2})월\s*([\d,\s]+)일/;
  const dem = rule.match(dayEqualRe);
  if(dem && (rule.includes('나누기') || rule.includes('균등') || rule.includes('동일'))) {
    const month = parseInt(dem[1]);
    const days = dem[2].split(',').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d)&&d>0);
    if(days.length > 0) return {type:'split_days', month, days};
  }

  // ── 패턴 2: 월별 시간 지정 분할 ────────────────────────
  // 예: "2월 20시간, 3월 10시간, 4월 10시간"
  const splitRe = /(\d{1,2})월\s*(\d+(?:\.\d+)?)\s*시간/g;
  const splits = [];
  let m;
  while((m = splitRe.exec(rule)) !== null){
    splits.push({month: parseInt(m[1]), hours: parseFloat(m[2])});
  }
  if(splits.length > 0) return {type:'split', splits};

  // ── 패턴 3: 사이트 재분류 ──────────────────────────────
  // 예: "보고펀드 고객사로 포함"
  const reclassRe = /^(\S+)\s*(?:고객사|고객사로|로|걸로|에)\s*(?:포함|분류)/;
  const rm = rule.match(reclassRe);
  if(rm) return {type:'reclassify', site: rm[1]};

  const simpleRe = /^(.+?)\s*고객사/;
  const sm = rule.match(simpleRe);
  if(sm) return {type:'reclassify', site: sm[1].trim()};

  return {type:'unknown', rule};
}

// ── 월별 데이터 빌드 ────────────────────────────────
function buildMonthlyData() {
  moData={};
  const monthSet=new Set();

  const mwf = document.getElementById('mfw') ? document.getElementById('mfw').value : '';
  const wc2 = fc(['처리자','assignee','agent']);
  ZR.forEach(r=>{
    // 처리자 필터
    if(mwf && wc2 && r[wc2] !== mwf) return;
    // 시간 없으면 제외 (상태 무관, 시간 기록된 것만)
    const cust = parseH(r[ZHC]);
    const total = parseH(r[ZNC]);
    if(cust === 0 && total === 0) return;
    // 날짜 기준: 요청 날짜 (없으면 업데이트시간)
    const reqDate = pd(r[ZQC]||'') || pd(r[ZQF]||'') || getEffDate(r);
    if(!reqDate) return;
    const y=reqDate.getFullYear(), m=reqDate.getMonth()+1;
    const monthKey=`${y}년${m}월`;
    monthSet.add(monthKey);

    // 사이트: applyIdMapping에서 '사이트' 필드가 있으면 우선 사용
    const site = r['사이트'] || getSiteName(r[ZOC]||'', r[ZSY]||'');

    // 설정 시트 월별 분할 규칙 적용
    if (r['_split_rules'] && r['_split_rules'].length > 0) {
      const year = reqDate.getFullYear();
      r['_split_rules'].forEach(sp=>{
        const ym = `${year}년${sp.month}월`;
        if(!moData[ym]) moData[ym]={};
        if(!moData[ym][site]) moData[ym][site]={c:0,n:0,m:0,cnt:0};
        moData[ym][site].c += sp.hours;
        moData[ym][site].n += sp.hours;
        moData[ym][site].cnt++;
        monthSet.add(ym);
      });
      return;
    }

    // 요청일부터 평일 N일로 균등 분할
    if (r['_split_weekdays']) {
      const n = r['_split_weekdays'];
      const totalH = cust || total;
      const perDay = totalH / n;
      // 요청일부터 평일만 카운트해서 날짜 수집
      const dates = [];
      const cur = new Date(reqDate);
      while(dates.length < n) {
        const dow = cur.getDay();
        if(dow !== 0 && dow !== 6) dates.push(new Date(cur)); // 월~금
        cur.setDate(cur.getDate()+1);
      }
      dates.forEach(d=>{
        const y2=d.getFullYear(), mo2=d.getMonth()+1;
        const ym2=`${y2}년${mo2}월`;
        const dk=tds(d);
        if(!moData[ym2]) moData[ym2]={};
        if(!moData[ym2][site]) moData[ym2][site]={c:0,n:0,m:0,cnt:0};
        moData[ym2][site].c+=perDay; moData[ym2][site].n+=perDay; moData[ym2][site].cnt++;
        monthSet.add(ym2);
        if(!dayData[dk]) dayData[dk]={c:0,n:0,rows:[]};
        dayData[dk].c+=perDay; dayData[dk].n+=perDay;
        dayData[dk].rows.push({...r,'_virtual_day':dk,'_perday_h':perDay});
      });
      return;
    }

    // 특정 날짜들로 균등 분할
    if (r['_split_days']) {
      const sd = r['_split_days'];
      const year = reqDate.getFullYear();
      const totalH = cust || total;
      const perDay = totalH / sd.days.length;
      const ym = `${year}년${sd.month}월`;
      // 월별 집계에는 합산
      if(!moData[ym]) moData[ym]={};
      if(!moData[ym][site]) moData[ym][site]={c:0,n:0,m:0,cnt:0};
      moData[ym][site].c += totalH;
      moData[ym][site].n += totalH;
      moData[ym][site].cnt++;
      monthSet.add(ym);
      // 일별 집계에는 날짜별로 분산
      sd.days.forEach(day=>{
        const dk = `${year}-${String(sd.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if(!dayData[dk]) dayData[dk]={c:0,n:0,rows:[]};
        dayData[dk].c += perDay;
        dayData[dk].n += perDay;
        dayData[dk].rows.push({...r, '_virtual_day': dk, '_perday_h': perDay});
      });
      return;
    }

    if(!moData[monthKey]) moData[monthKey]={};
    if(!moData[monthKey][site]) moData[monthKey][site]={c:0,n:0,m:0,cnt:0};
    moData[monthKey][site].c += cust;
    moData[monthKey][site].n += total;
    moData[monthKey][site].cnt++;
  });

  // 월 정렬 (오래된 순)
  moMonths=[...monthSet].sort((a,b)=>{
    const pa=a.match(/(\d+)년(\d+)월/),pb=b.match(/(\d+)년(\d+)월/);
    return (pa[1]*100+parseInt(pa[2]))-(pb[1]*100+parseInt(pb[2]));
  });

  // 월 셀렉트 갱신
  // 연도/월 셀렉트 채우기
  const years=[...new Set(moMonths.map(m=>m.match(/(\d{4})년/)[1]))].sort((a,b)=>b-a);
  const ySel=document.getElementById('mo-year');
  ySel.innerHTML='<option value="">전체</option>';
  years.forEach(y=>{const o=document.createElement('option');o.value=o.textContent=y+'년';ySel.appendChild(o);});
  const mSel=document.getElementById('mo-month');
  mSel.innerHTML='<option value="">전체</option>';
  ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach(m=>{
    const o=document.createElement('option');o.value=o.textContent=m;mSel.appendChild(o);
  });
  // 현재 날짜로 기본 선택
  const now=new Date();
  const curY=now.getFullYear()+'년', curM=(now.getMonth()+1)+'월';
  if(years.includes(String(now.getFullYear()))) ySel.value=curY;
  mSel.value=curM;
  renderMonthly();
  buildWeeklyData();
  buildDailyData();
}

// ── 주별 데이터 ──────────────────────────────────────
let wkData={}, wkWeeks=[], wkDetailSite=null;

function getWeekKey(date) {
  const d=new Date(date); d.setHours(0,0,0,0);
  const day=d.getDay()===0?7:d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-day+1);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  const jan4=new Date(d.getFullYear(),0,4);
  const sow=new Date(jan4); sow.setDate(jan4.getDate()-(jan4.getDay()===0?6:jan4.getDay()-1));
  const weekNum=Math.floor((d-sow)/(7*86400000))+1;
  return {key:`${d.getFullYear()}년 ${weekNum}주차 (${fmt(mon)}~${fmt(sun)})`, mon};
}

function buildWeeklyData() {
  wkData={};
  const wkf=document.getElementById('wk-fw')?document.getElementById('wk-fw').value:'';
  const wc2=fc(['처리자','assignee','agent']);
  ZR.forEach(r=>{
    if(wkf&&wc2&&r[wc2]!==wkf) return;
    // 시간 없으면 제외
    const c=parseH(r[ZHC]), n=parseH(r[ZNC]);
    if(c===0 && n===0) return;
    // 요청 날짜 기준
    const reqDate = pd(r[ZQC]||'') || pd(r[ZQF]||'') || getEffDate(r);
    if(!reqDate) return;
    const {key}=getWeekKey(reqDate);
    const site=r['사이트']||getSiteName(r[ZOC]||'',r[ZSY]||'');
    if(!wkData[key]) wkData[key]={};
    if(!wkData[key][site]) wkData[key][site]={c:0,n:0,rows:[]};
    wkData[key][site].c+=c; wkData[key][site].n+=n; wkData[key][site].rows.push(r);
  });
  wkWeeks=Object.keys(wkData).sort((a,b)=>{
    const ya=parseInt(a),yb=parseInt(b);
    const wa=parseInt((a.match(/(\d+)주차/)||['','0'])[1]);
    const wb=parseInt((b.match(/(\d+)주차/)||['','0'])[1]);
    return ya!==yb?ya-yb:wa-wb;
  });
  // 오늘 날짜의 주를 자동 선택
  selectTodayWeek();
  renderWeekly();
}
function selectTodayWeek() {
  const todayKey = getWeekKey(new Date()).key;
  // 데이터 있는 주 중 가장 가까운 주 찾기 (오늘 주 우선, 없으면 가장 최근 주)
  const target = wkWeeks.includes(todayKey) ? todayKey : (wkWeeks.length ? wkWeeks[wkWeeks.length-1] : todayKey);
  wpSelectedWeekKey = target;
  const wm = target.match(/(\d+)주차/);
  const dm2 = target.match(/\((\d{4}-\d{2}-\d{2})~(\d{4}-\d{2}-\d{2})\)/);
  const wNum = wm ? wm[1]+'주차' : target;
  const range = dm2 ? ` (${dm2[1].slice(5)}~${dm2[2].slice(5)})` : '';
  const lbl = document.getElementById('wp-label');

    wpYear = mon.getFullYear();

  }
}

}

let wpYear = new Date().getFullYear();

function wpMove(dir) {
  wpMonth += dir;
  if(wpMonth > 11) { wpMonth = 0; wpYear++; }
  else if(wpMonth < 0) { wpMonth = 11; wpYear--; }
  renderWeekPickerCalendar();
}

function renderWeekPickerCalendar() {
  document.getElementById('wp-title').textContent = `${wpYear}년 ${wpMonth+1}월`;
  const dows = ['월','화','수','목','금','토','일'];
  let g = dows.map(d=>`<div class="wp-dow">${d}</div>`).join('');
  const first = new Date(wpYear, wpMonth, 1);
  const startDow = first.getDay()===0 ? 6 : first.getDay()-1;
  const dim = new Date(wpYear, wpMonth+1, 0).getDate();

  // 선택된 주의 월~금 범위
  let selMon = null, selSun = null;
  if(wpSelectedWeekKey) {
    const m = wpSelectedWeekKey.match(/\((\d{4}-\d{2}-\d{2})~(\d{4}-\d{2}-\d{2})\)/);
    if(m) {
      selMon = new Date(m[1]);
      selSun = new Date(m[2]);
    }
  }

  // 이전 달 빈칸
  const prevDim = new Date(wpYear, wpMonth, 0).getDate();
  for(let i=0; i<startDow; i++) {
    const d = prevDim - startDow + i + 1;
    const date = new Date(wpYear, wpMonth-1, d);
    g += makeWpDay(d, date, true, selMon, selSun);
  }
  for(let d=1; d<=dim; d++) {
    const date = new Date(wpYear, wpMonth, d);
    g += makeWpDay(d, date, false, selMon, selSun);
  }
  // 다음 달 빈칸
  const total = startDow + dim;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let d=1; d<=remain; d++) {
    const date = new Date(wpYear, wpMonth+1, d);
    g += makeWpDay(d, date, true, selMon, selSun);
  }
  document.getElementById('wp-grid').innerHTML = g;
}

function makeWpDay(d, date, otherMonth, selMon, selSun) {
  let cls = 'wp-day' + (otherMonth?' other-month':'');
  if(selMon && selSun && date >= selMon && date <= selSun) {
    if(date.getTime() === selMon.getTime()) cls += ' week-start';
    else if(date.getTime() === selSun.getTime()) cls += ' week-end';
    else cls += ' in-week';
  }
  const dateStr = tds(date);
  return `<div class="${cls}" onclick="selectWeekByDate('${dateStr}')">${d}</div>`;
}

function selectWeekByDate(dateStr) {
  const date = new Date(dateStr);
  const {key} = getWeekKey(date);
  // wkWeeks에 있는 키인지 확인
  if(wkWeeks.includes(key)) {
    wpSelectedWeekKey = key;
  } else {
    // 데이터 없는 주 선택 시 가장 가까운 주 찾기
    wpSelectedWeekKey = key; // 그냥 설정 (빈 결과 표시)
  }
  // 레이블 업데이트
  const m = key.match(/(\d+)주차/);
  const wNum = m ? m[1]+'주차' : key;
  const dm = key.match(/\((\d{4}-\d{2}-\d{2})~(\d{4}-\d{2}-\d{2})\)/);
  const range = dm ? ` (${dm[1].slice(5)}~${dm[2].slice(5)})` : '';
  document.getElementById('wp-label').textContent = wNum + range;
  document.getElementById('wp-dropdown').classList.add('hidden');
  renderWeekPickerCalendar();
  renderWeekly();
}

  tC+=other.c;tN+=other.n;
  document.getElementById('wk-cards').innerHTML=`
    <div class="wk-card"><div class="wk-card-label">처리 고객사</div><div class="wk-card-value">${tCnt}</div></div>
    <div class="wk-card"><div class="wk-card-label">고객시간 합계</div><div class="wk-card-value">${tC.toFixed(2)}H</div></div>
    <div class="wk-card"><div class="wk-card-label">내부시간 합계</div><div class="wk-card-value">${tN.toFixed(2)}H</div></div>
    <div class="wk-card"><div class="wk-card-label">M/M</div><div class="wk-card-value">${(tN/160).toFixed(3)}</div></div>`;
  document.getElementById('wk-thead').innerHTML='<tr><th>사이트</th><th>시스템 유형</th><th class="num">고객시간</th><th class="num">내부시간</th><th class="num">M/M</th><th class="num">건수</th></tr>';
  let tb='',sumC=0,sumN=0;
  SITE_ORDER.filter(site=>!tf||getSiteType(site)===tf).forEach(site=>{
    const v=sd[site]; const has=v.rows.length>0;
    sumC+=v.c;sumN+=v.n;
    const safe=site.replace(/'/g,"\\'");
    tb+=`<tr style="${has?'':'opacity:0.3;'}" class="${has?'clickable':''}" ${has?`onclick="showWkDetail('${safe}')" data-wksite="${site}"`:''}>`
      +`<td style="font-weight:500">${site}${has?' <span style="font-size:10px;color:var(--c3)">▾</span>':''}</td>`
      +`<td>${tbadge(getSiteType(site))}</td>`
      +`<td class="num">${v.c.toFixed(2)}</td><td class="num">${v.n.toFixed(2)}</td>`
      +`<td class="num">${v.n>0?(v.n/160).toFixed(3):'0.000'}</td>`
      +`<td class="num">${v.rows.length||''}</td></tr>`;
  });
  if(other.rows.length){
    sumC+=other.c;sumN+=other.n;
    tb+=`<tr class="clickable" onclick="showWkDetailOther()">`
      +`<td style="font-weight:500;color:var(--cs)">기타 <span style="font-size:10px">▾</span></td><td>-</td>`
      +`<td class="num">${other.c.toFixed(2)}</td><td class="num">${other.n.toFixed(2)}</td>`
      +`<td class="num">${other.n>0?(other.n/160).toFixed(3):'0.000'}</td>`
      +`<td class="num">${other.rows.length}</td></tr>`;
  }
  tb+=`<tr class="sum-row"><td>합계</td><td></td><td class="num">${sumC.toFixed(2)}</td><td class="num">${sumN.toFixed(2)}</td><td class="num">${sumN>0?(sumN/160).toFixed(3):'0.000'}</td><td></td></tr>`;
  document.getElementById('wk-tbody').innerHTML=tb;
  closeWkDetail();
}

function showWkDetail(site){
  if(wkDetailSite===site&&!document.getElementById('wk-dp').classList.contains('hidden')){closeWkDetail();return;}
  wkDetailSite=site;
  document.querySelectorAll('#wk-tbody tr').forEach(t=>t.classList.remove('mo-active'));
  const tr=document.querySelector(`#wk-tbody tr[data-wksite="${site}"]`);if(tr)tr.classList.add('mo-active');
  const sel=document.getElementById('wk-sel').value;
  const weeks=sel?[sel]:wkWeeks;
  let rows=[];weeks.forEach(wk=>{if(wkData[wk]&&wkData[wk][site])rows.push(...wkData[wk][site].rows);});
  rows.sort((a,b)=>new Date(gdd(a,ZQC,ZQF))-new Date(gdd(b,ZQC,ZQF)));

}
function showWkDetailOther(){

  const sel=document.getElementById('wk-sel').value;

function closeWkDetail(){wkDetailSite=null;document.getElementById('wk-dp').classList.add('hidden');document.querySelectorAll('#wk-tbody tr').forEach(t=>t.classList.remove('mo-active'));}

// ── 일별 데이터 ──────────────────────────────────────
let dayData={}, calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), selectedDay=null;

function buildDailyData(){
  dayData={};
  const wf=document.getElementById('day-fw')?document.getElementById('day-fw').value:'';
  const wc2=fc(['처리자','assignee','agent']);
  ZR.forEach(r=>{
    if(wf&&wc2&&r[wc2]!==wf) return;
    // 시간 없으면 제외
    const c=parseH(r[ZHC]),n=parseH(r[ZNC]);
    if(c===0 && n===0) return;
    // 요청 날짜 기준
    const reqDate = pd(r[ZQC]||'') || pd(r[ZQF]||'') || getEffDate(r);
    if(!reqDate) return;
    const dk=tds(reqDate);
    if(!dayData[dk]) dayData[dk]={c:0,n:0,rows:[]};
    dayData[dk].c+=c; dayData[dk].n+=n; dayData[dk].rows.push(r);
  });
  renderCalendar();
}
function rebuildDaily(){dayData={};selectedDay=null;buildDailyData();}

function calMove(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  else if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=`${calYear}년 ${calMonth+1}월`;
  const dows=['월','화','수','목','금','토','일'];
  let g=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1);
  const startDow=first.getDay()===0?6:first.getDay()-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const today=tds(new Date());
  for(let i=0;i<startDow;i++) g+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=dim;d++){
    const dk=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const v=dayData[dk];
    const cls=['cal-day',v?'has-data':'',selectedDay===dk?'selected':'',dk===today?'today':''].filter(Boolean).join(' ');
    const hl=v?`<span class="cal-day-h">${v.c.toFixed(1)}H</span>`:'';
    g+=`<div class="${cls}" onclick="selectDay('${dk}')"><span class="cal-day-num">${d}</span>${hl}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=g;
}

function selectDay(dk){
  if(selectedDay===dk){selectedDay=null;document.getElementById('day-selected-area').classList.add('hidden');renderCalendar();return;}
  selectedDay=dk;
  renderCalendar();
  showDayDetail(dk);
}

function showDayDetail(dk){
  const v=dayData[dk];
  const rows=v?[...v.rows]:[];
  rows.sort((a,b)=>new Date(gdd(a,ZQC,ZQF))-new Date(gdd(b,ZQC,ZQF)));
  document.getElementById('day-selected-title').textContent=`${dk} 처리 내역`;
  document.getElementById('day-cards').innerHTML=`
    <div class="wk-card"><div class="wk-card-label">처리 건수</div><div class="wk-card-value">${rows.length}</div></div>
    <div class="wk-card"><div class="wk-card-label">고객시간</div><div class="wk-card-value">${v?v.c.toFixed(2):0}H</div></div>
    <div class="wk-card"><div class="wk-card-label">내부시간</div><div class="wk-card-value">${v?v.n.toFixed(2):0}H</div></div>
    <div class="wk-card"><div class="wk-card-label">M/M</div><div class="wk-card-value">${v&&v.n>0?(v.n/160).toFixed(3):'0.000'}</div></div>`;
  const hours={};
  rows.forEach(r=>{
    const upd=r[ZFC]||'';
    const m=String(upd).match(/(\d{1,2}):\d{2}/);
    if(m){const h=parseInt(m[1]);hours[h]=(hours[h]||0)+1;}
  });
  const hKeys=Object.keys(hours).map(Number).sort((a,b)=>a-b);
  const maxH=Math.max(...Object.values(hours),1);
  let barHtml=hKeys.length
    ? hKeys.map(h=>{const cnt=hours[h];const ht=Math.max(Math.round((cnt/maxH)*60),4);
        return`<div class="hour-bar-wrap"><div class="hour-bar-count">${cnt}</div><div class="hour-bar" style="height:${ht}px"></div><div class="hour-bar-label">${h}시</div></div>`;}).join('')
    : '<div style="font-size:12px;color:var(--c3);padding:16px 0;">시간 데이터 없음</div>';
  document.getElementById('hour-bars').innerHTML=barHtml;
  document.getElementById('day-dp-title').textContent=`티켓 목록 · ${rows.length}건`;
  renderDetailTable('day-dp-thead','day-dp-tbody',rows);
  document.getElementById('day-selected-area').classList.remove('hidden');
  document.getElementById('day-selected-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── 공통 복사 ────────────────────────────────────────
function copyDetail(tbodyId,toastId){
  const tbody=document.getElementById(tbodyId); if(!tbody) return;
  const lines=[...tbody.querySelectorAll('tr')].map(tr=>
    [...tr.querySelectorAll('td')].map(td=>td.innerText.trim().replace(/\n/g,' ')).join('\t')
  ).filter(l=>l);
  const tsv=lines.join('\n');
  const done=()=>{const t=document.getElementById(toastId);if(t){t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2000);}};
  navigator.clipboard.writeText(tsv).then(done).catch(()=>{
    const ta=document.createElement('textarea');ta.value=tsv;ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();
  });
}


function parseH(val) {
  if(!val) return 0;
  const s=String(val).replace(/'/g,'').trim();
  if(!s||s==='-') return 0;
  return parseFloat(s)||0;
}
// 텍스트 필드: '-'만 있거나 공란이면 빈 문자열로
function cleanVal(val) {
  if(val===null||val===undefined) return '';
  const s=String(val).replace(/'/g,'').trim();
  if(s==='-'||s==='') return '';
  return s;
}

function getEffDate(row) {
  const d=pd(row[ZEC]);
  if(d) return d;
  const f=pd(row[ZFC]);
  return f||null;
}

// ── 월별 렌더링 ──────────────────────────────────────
function renderMonthly() {
  // 연도+월 조합으로 sel 결정
  const _y=document.getElementById('mo-year')?document.getElementById('mo-year').value:'';
  const _m=document.getElementById('mo-month')?document.getElementById('mo-month').value:'';
  const sel = (_y&&_m) ? _y+_m : '';  // e.g. '2026년5월'
  const tf=document.getElementById('mtf').value;

  // 선택된 월(들) 결정
  // 연도만 선택 시 해당 연도 월 전체, 연도+월 선택 시 특정 월, 없으면 전체
  let months;
  if(_y && _m) months = moMonths.filter(mo=>mo===_y+_m);
  else if(_y)  months = moMonths.filter(mo=>mo.startsWith(_y));
  else         months = moMonths;

  // 사이트별 집계
  const siteData={};
  SITE_ORDER.forEach(site=>{ siteData[site]={c:0,n:0}; });

  months.forEach(mo=>{
    const md=moData[mo]||{};
    Object.entries(md).forEach(([site,v])=>{
      // SITE_ORDER에 있는 사이트만
      if(siteData[site]!==undefined){
        siteData[site].c+=v.c;
        siteData[site].n+=v.n;
      } else {
        // 공유형 계열이면 공유형으로 합산
        if(getSysType(ZR.find(r=>getSiteName(r[ZOC]||'',r[ZSY]||'')===site)?.[ZSY]||'')==='공유형'||site==='공유형'){
          siteData['공유형']=(siteData['공유형']||{c:0,n:0});
          siteData['공유형'].c+=v.c; siteData['공유형'].n+=v.n;
        }
      }
    });
  });

  // 시스템 유형 필터
  let filtered = SITE_ORDER.filter(site=>{
    if(tf && getSiteType(site)!==tf) return false;
    return true;
  });

  // 요약 카드
  const bt={단독형:{c:0,n:0,cnt:0},유상:{c:0,n:0,cnt:0},공유형:{c:0,n:0,cnt:0}};
  let tC=0,tN=0;
  filtered.forEach(site=>{
    const v=siteData[site]||{c:0,n:0};
    tC+=v.c; tN+=v.n;
    const t=getSiteType(site);
    if(bt[t]){bt[t].c+=v.c;bt[t].n+=v.n;bt[t].cnt++;}
  });

  document.getElementById('msc').innerHTML=`
    <div class="mc"><div class="mcl">전체 고객사</div><div class="mcv">${filtered.length}</div></div>
    <div class="mc"><div class="mcl">고객시간 합계</div><div class="mcv">${tC.toFixed(2)}H</div></div>
    <div class="mc"><div class="mcl">내부시간 합계</div><div class="mcv">${tN.toFixed(2)}H</div></div>
    <div class="mc"><div class="mcl">M/M 합계</div><div class="mcv">${(tN/160).toFixed(3)}</div></div>
    <div class="mc" style="border:1px solid #7dd3fc;cursor:pointer;" onclick="ftf('단독형')">
      <div class="mcl">${tbadge('단독형')}</div>
      <div class="mcv">${bt['단독형'].cnt}<span style="font-size:13px;font-weight:400;color:var(--cs)"> 사</span></div>
      <div style="font-size:11px;color:var(--c3);margin-top:2px;">${bt['단독형'].c.toFixed(2)}H</div>
    </div>
    <div class="mc" style="border:1px solid #fcd34d;cursor:pointer;" onclick="ftf('유상')">
      <div class="mcl">${tbadge('유상')}</div>
      <div class="mcv">${bt['유상'].cnt}<span style="font-size:13px;font-weight:400;color:var(--cs)"> 사</span></div>
      <div style="font-size:11px;color:var(--c3);margin-top:2px;">${bt['유상'].c.toFixed(2)}H</div>
    </div>
    <div class="mc" style="border:1px solid #86efac;cursor:pointer;" onclick="ftf('공유형')">
      <div class="mcl">${tbadge('공유형')}</div>
      <div class="mcv">${bt['공유형'].cnt}<span style="font-size:13px;font-weight:400;color:var(--cs)"> 사</span></div>
      <div style="font-size:11px;color:var(--c3);margin-top:2px;">${bt['공유형'].c.toFixed(2)}H</div>
    </div>`;

  // 테이블 헤더
  const dm = sel?[sel]:moMonths;
  let th=`<tr><th>사이트</th><th>시스템 명칭</th>`;
  dm.forEach(mo=>{th+=`<th class="num">${mo}<br>고객시간</th><th class="num">내부시간</th><th class="num">M/M</th>`;});
  if(!sel&&dm.length>1) th+=`<th class="num">합계<br>고객시간</th><th class="num">내부시간</th><th class="num">M/M</th>`;
  th+=`</tr>`;
  document.getElementById('mth').innerHTML=th;

  // 테이블 바디
  let tb='';
  let sumC=0,sumN=0;
  const sumByMo={};dm.forEach(mo=>{sumByMo[mo]={c:0,n:0};});

  // 기타 사이트 집계 (SITE_ORDER에 없는 것들)
  const otherSites = {};
  months.forEach(mo=>{
    const md=moData[mo]||{};
    Object.entries(md).forEach(([site,v])=>{
      if(!SITE_ORDER.includes(site)){
        if(!otherSites[site]) otherSites[site]={c:0,n:0};
        otherSites[site].c+=v.c; otherSites[site].n+=v.n;
      }
    });
  });
  const otherList=Object.entries(otherSites).filter(([,v])=>v.c>0||v.n>0);

  filtered.forEach(site=>{
    const type=getSiteType(site);
    tb+=`<tr class="clickable" data-site="${site}" onclick="showMoDetail('${site}')" id="mo-row-${site.replace(/[^a-zA-Z0-9가-힣]/g,'_')}">`;
    tb+=`<td style="font-weight:500">${site} <span style="font-size:10px;color:var(--c3)">▾</span></td><td>${tbadge(type)}</td>`;
    let rowC=0,rowN=0;
    dm.forEach(mo=>{
      const v=(moData[mo]||{})[site]||{c:0,n:0};
      tb+=`<td class="num">${v.c.toFixed(2)}</td><td class="num">${v.n.toFixed(2)}</td><td class="num">${v.n>0?(v.n/160).toFixed(3):'0.000'}</td>`;
      rowC+=v.c; rowN+=v.n;
      sumByMo[mo].c+=v.c; sumByMo[mo].n+=v.n;
    });
    sumC+=rowC; sumN+=rowN;
    if(!sel&&dm.length>1) tb+=`<td class="num" style="font-weight:500">${rowC.toFixed(2)}</td><td class="num" style="font-weight:500">${rowN.toFixed(2)}</td><td class="num" style="font-weight:500">${rowN>0?(rowN/160).toFixed(3):'0.000'}</td>`;
    tb+=`</tr>`;
  });

  // 기타 사이트 행 (데이터 있을 때만)
  if(otherList.length>0 && (!tf)){
    let etherC=0,etherN=0;
    otherList.forEach(([,v])=>{etherC+=v.c;etherN+=v.n;});
    sumC+=etherC; sumN+=etherN;
    dm.forEach(mo=>{
      const mv=moData[mo]||{};
      let mc=0,mn=0;
      Object.entries(mv).forEach(([site,v])=>{if(!SITE_ORDER.includes(site)){mc+=v.c;mn+=v.n;}});
      sumByMo[mo].c+=mc; sumByMo[mo].n+=mn;
    });
    tb+=`<tr class="clickable" onclick="showMoDetailOther()" id="mo-row-other">`;
    tb+=`<td style="font-weight:500;color:var(--cs)">기타 (${otherList.length}개 사이트) <span style="font-size:10px">▾</span></td><td>-</td>`;
    dm.forEach(mo=>{
      const mv=moData[mo]||{};let mc=0,mn=0;
      Object.entries(mv).forEach(([site,v])=>{if(!SITE_ORDER.includes(site)){mc+=v.c;mn+=v.n;}});
      tb+=`<td class="num">${mc.toFixed(2)}</td><td class="num">${mn.toFixed(2)}</td><td class="num">${mn>0?(mn/160).toFixed(3):'0.000'}</td>`;
    });
    if(!sel&&dm.length>1) tb+=`<td class="num" style="font-weight:500">${etherC.toFixed(2)}</td><td class="num" style="font-weight:500">${etherN.toFixed(2)}</td><td class="num" style="font-weight:500">${etherN>0?(etherN/160).toFixed(3):'0.000'}</td>`;
    tb+=`</tr>`;
  }

  // 합계 행
  tb+=`<tr class="sum-row"><td>합계</td><td></td>`;
  dm.forEach(mo=>{const v=sumByMo[mo];tb+=`<td class="num">${v.c.toFixed(2)}</td><td class="num">${v.n.toFixed(2)}</td><td class="num">${v.n>0?(v.n/160).toFixed(3):'0.000'}</td>`;});
  if(!sel&&dm.length>1) tb+=`<td class="num">${sumC.toFixed(2)}</td><td class="num">${sumN.toFixed(2)}</td><td class="num">${sumN>0?(sumN/160).toFixed(3):'0.000'}</td>`;
  tb+=`</tr>`;

  if(!filtered.length) tb='<tr><td colspan="99" style="padding:16px;text-align:center;color:var(--c3);">데이터 없음</td></tr>';
  document.getElementById('mtb').innerHTML=tb;
}

// ── 월별 사이트 상세 ──────────────────────────────────
let moDetailSite = null;

function showMoDetail(site) {
  if(moDetailSite === site){closeMoDetail();return;}
  moDetailSite = site;
  // 행 하이라이트
  document.querySelectorAll('.mtw table tbody tr').forEach(tr=>tr.classList.remove('mo-active'));
  const rowId = 'mo-row-' + site.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const tr = document.getElementById(rowId);
  if(tr) tr.classList.add('mo-active');

  // 해당 사이트 티켓 수집 (현재 선택 월 기준)
  const _y=document.getElementById('mo-year')?document.getElementById('mo-year').value:'';
  const _m=document.getElementById('mo-month')?document.getElementById('mo-month').value:'';
  const sel = (_y&&_m) ? _y+_m : '';
  const rows = ZR.filter(r=>{
    const rSite = r['사이트'] || getSiteName(r[ZOC]||'', r[ZSY]||'');
    if(rSite !== site) return false;
    if(sel){
      const effDate = getEffDate(r);
      if(!effDate) return false;
      const ym = `${effDate.getFullYear()}년${effDate.getMonth()+1}월`;
      return ym === sel;
    }
    return true;
  });

  renderMoDetailTable(site + ' 티켓 목록', rows);
}

function showMoDetailOther() {
  if(moDetailSite === '__other__'){closeMoDetail();return;}
  moDetailSite = '__other__';
  document.querySelectorAll('.mtw table tbody tr').forEach(tr=>tr.classList.remove('mo-active'));
  const tr = document.getElementById('mo-row-other');
  if(tr) tr.classList.add('mo-active');

  const _y=document.getElementById('mo-year')?document.getElementById('mo-year').value:'';
  const _m=document.getElementById('mo-month')?document.getElementById('mo-month').value:'';
  const sel = (_y&&_m) ? _y+_m : '';
  const rows = ZR.filter(r=>{
    const rSite = r['사이트'] || getSiteName(r[ZOC]||'', r[ZSY]||'');
    if(SITE_ORDER.includes(rSite)) return false;
    if(sel){
      const effDate = getEffDate(r);
      if(!effDate) return false;

      return ym === sel;

  });

}

function renderMoDetailTable(title, rows) {
  // 요청일자 오름차순 정렬
  rows.sort((a, b) => {
    const da = new Date(gdd(a, ZQC, ZQF).replace(/-/g,'/'));
    const db = new Date(gdd(b, ZQC, ZQF).replace(/-/g,'/'));
    return da - db;
  });
  document.getElementById('mo-dp-title').textContent = `${title} · ${rows.length}건`;
  document.getElementById('mo-dp-thead').innerHTML =
    '<tr><th>요청일자</th><th>CSR내용</th><th>요청자</th><th>처리일자</th><th>소요시간</th><th>처리자</th><th>처리상태</th><th>CSR유형</th><th>작업내용</th></tr>';

  const statusLabel = STATUS_LABEL;
  const bgMap2={'해결':'var(--bgg)','보류':'var(--bgw)','대기':'var(--bgw)','등록':'var(--bgi)'};
  const txMap2={'해결':'var(--cg)','보류':'var(--cw)','대기':'var(--cw)','등록':'var(--ci)'};

  if(!rows.length){
    document.getElementById('mo-dp-tbody').innerHTML =
      '<tr><td colspan="9" style="padding:14px;text-align:center;color:var(--c3);">해당 건이 없습니다.</td></tr>';
  } else {
    document.getElementById('mo-dp-tbody').innerHTML = rows.map(r=>{
      const st=(r[ZSC]||'').trim();
      const bg=bgMap2[st]||'var(--bg3)',tx=txMap2[st]||'var(--cs)';
      const reqDate = gdd(r, ZQC, ZQF);
      const endDate = gdd(r, ZEC, ZFC);
      const cH = parseH(r[ZHC]);
      const requester = cleanVal(r[fc(['요청자','requester'])||'']);
      const worker = cleanVal(r[fc(['처리자','assignee','agent'])||'']);
      const csr = CSR_LABEL(cleanVal(r[ZCC]||''));
      const content = cleanVal(r[ZDC]||'');
      const title = cleanVal(r[ZTC]||'');
      return `<tr>
        <td style="white-space:nowrap">${reqDate}</td>
        <td style="max-width:220px;white-space:normal;word-break:break-all;line-height:1.4;">${title}</td>
        <td style="white-space:nowrap">${requester}</td>
        <td style="white-space:nowrap">${endDate}</td>
        <td class="num">${cH.toFixed(2)}</td>
        <td style="white-space:nowrap">${worker}</td>
        <td><span class="stp" style="background:${bg};color:${tx}">${statusLabel(st)}</span></td>
        <td style="white-space:nowrap">${csr}</td>
        <td style="max-width:220px;white-space:normal;word-break:break-all;line-height:1.4;">${content}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('mo-dp').classList.remove('hidden');
  document.getElementById('mo-dp').scrollIntoView({behavior:'smooth',block:'nearest'});
}

  document.getElementById('mo-dp').classList.add('hidden');
  document.querySelectorAll('.mtw table tbody tr').forEach(tr=>tr.classList.remove('mo-active'));
}

// ── 월별 테이블 복사 (고객시간·내부시간만) ───────────
function copyMonthlyTable() {
  const _y=document.getElementById('mo-year')?document.getElementById('mo-year').value:'';
  const _m=document.getElementById('mo-month')?document.getElementById('mo-month').value:'';
  const sel = (_y&&_m) ? _y+_m : '';
  const tf  = document.getElementById('mtf').value;
  let dm;
  if(_y && _m) dm = moMonths.filter(mo=>mo===_y+_m);
  else if(_y)  dm = moMonths.filter(mo=>mo.startsWith(_y));
  else         dm = moMonths;
  const multiMonth = dm.length > 1;

  // 필터된 사이트 목록
  const filtered = SITE_ORDER.filter(site => !tf || getSiteType(site) === tf);

  // 헤더 행 만들기
  // 사이트 | (월별 고객H, 내부H 반복) | [합계 고객H, 내부H]
  let header = ['사이트'];
  dm.forEach(mo => { header.push(mo + ' 고객시간'); header.push(mo + ' 내부시간'); });
  if (multiMonth) { header.push('합계 고객시간'); header.push('합계 내부시간'); }

  const rows = [header];

  filtered.forEach(site => {
    const row = [site];
    let sumC = 0, sumN = 0;
    dm.forEach(mo => {
      const v = (moData[mo] || {})[site] || { c: 0, n: 0 };
      row.push(v.c.toFixed(2));
      row.push(v.n.toFixed(2));
      sumC += v.c; sumN += v.n;
    });
    if (multiMonth) { row.push(sumC.toFixed(2)); row.push(sumN.toFixed(2)); }
    rows.push(row);
  });

  // 합계 행
  const sumRow = ['합계'];
  const sumByMo = {};
  dm.forEach(mo => { sumByMo[mo] = { c: 0, n: 0 }; });
  filtered.forEach(site => {
    dm.forEach(mo => {
      const v = (moData[mo] || {})[site] || { c: 0, n: 0 };
      sumByMo[mo].c += v.c; sumByMo[mo].n += v.n;
    });
  });
  let totalC = 0, totalN = 0;
  dm.forEach(mo => {
    sumRow.push(sumByMo[mo].c.toFixed(2));
    sumRow.push(sumByMo[mo].n.toFixed(2));
    totalC += sumByMo[mo].c; totalN += sumByMo[mo].n;
  });
  if (multiMonth) { sumRow.push(totalC.toFixed(2)); sumRow.push(totalN.toFixed(2)); }
  rows.push(sumRow);

  // 탭 구분 TSV로 변환 (엑셀 붙여넣기 호환)
  const tsv = rows.map(r => r.join('\t')).join('\n');

  navigator.clipboard.writeText(tsv).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 2500);
  }).catch(() => {
    // clipboard API 실패시 fallback
    const ta = document.createElement('textarea');
    ta.value = tsv;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('copy-toast');
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 2500);
  });
}

// ── 티켓 집계 ────────────────────────────────────────
function calc() {
  const wf=document.getElementById('fw').value, ws=document.getElementById('ws').value;
  if(!ws){toast('기준 주 시작일을 선택해주세요.');return;}
  const ps=new Date(ws),pe=ad(ps,6);
  const wc=fc(['처리자','assignee','agent']);
  let data=wf&&wc?ZR.filter(r=>r[wc]===wf):ZR;
  const ss=new Set(['해결','solved','closed']);
  const isS=r=>ss.has((r[ZSC]||'').trim());
  const isR=r=>(r[ZSC]||'').trim()==='등록';
  const all=[...CLS,OL]; CB={}; all.forEach(l=>CB[l]={prev:[],this:[],remain:[]});
  let fb=0;
  const VROONG_CUTOFF = new Date('2026-06-01');
  data.forEach(r=>{
    const rSite = r['사이트'] || getSiteName(r[ZOC]||'', r[ZSY]||'');
    const isBuroong = (r[ZSY]||'').includes('[부릉]') || (r[ZOC]||'')==='Vroong' || rSite==='부릉';
    let cl = cc(r[ZSY]||'', r[ZOC]||'');
    // 부릉: 2026-06-01 이후는 무상(기타)로 분류
    if(isBuroong){
      const effDate = getEffDate(r);
      const reqDate = pd(r[ZQC]||r[ZQF]||'');
      const refDate = effDate || reqDate;
      if(refDate && refDate >= VROONG_CUTOFF) cl = OL;
    }
    if(isS(r)){
      const d=gee(r);
      if(!pd(r[ZEC])&&d)fb++;
      if(d&&d>=ps&&d<=pe)CB[cl].prev.push(r);
    } else if(isR(r)){CB[cl].this.push(r);CB[cl].remain.push(r);}
    else{CB[cl].remain.push(r);}
  });
  rct();
  document.getElementById('fn').textContent=fb>0?`* ${fb}건은 종료일 없어 업데이트 시간 기준으로 처리`:'';
  document.getElementById('result-area').classList.remove('hidden');
  closeDetail();
}

function rct(){
  const all=[...CLS,OL];
  const tot={prev:0,this:0,remain:0};
  all.forEach(l=>{tot.prev+=CB[l].prev.length;tot.this+=CB[l].this.length;tot.remain+=CB[l].remain.length;});
  let h='';
  all.forEach(l=>{
    const b=CB[l],has=b.prev.length+b.this.length+b.remain.length>0;
    const t=CL_TYPE[l]||'단독형';
    h+=`<tr style="${has?'':'opacity:0.35;'}" onclick="ocd('${l}')" data-c="${l}">
      <td style="font-weight:500">${l}</td>
      <td>${tbadge(t)}</td>
      <td class="num">${rc2(b.prev.length,'p')}</td>
      <td class="num">${rc2(b.this.length,'t')}</td>
      <td class="num">${rc2(b.remain.length,'r')}</td>
    </tr>`;
  });
  h+=`<tr class="trow"><td>합계</td><td></td><td class="num">${rc2(tot.prev,'p')}</td><td class="num">${rc2(tot.this,'t')}</td><td class="num">${rc2(tot.remain,'r')}</td></tr>`;
  document.getElementById('ctb').innerHTML=h;
}
function rc2(n,t){if(n===0)return`<span class="cb cb0">0</span>`;const c=t==='p'?'cbp':t==='t'?'cbt':'cbr';return`<span class="cb ${c}">${n}</span>`;}

// ── 상세 패널 ────────────────────────────────────────
const BL={prev:'지난 주 완료',this:'금주 예정 (등록)',remain:'잔여 티켓'};
const STATUS_LABEL = s => {
  if(!s) return s;
  if(s==='해결') return 'Closing-처리';
  if(s==='등록') return 'Open';
  if(s==='보류'||s==='대기') return 'Processing';
  return s;
};
const CSR_LABEL = s => {
  const v = cleanVal(s||'');
  if(!v||v==='nan') return '기타';
  if(v==='데이터 조정') return 'Contents 변경';
  if(v==='추가개발') return '추가개발';
  return v;
};
const BGM={'해결':'var(--bgg)','보류':'var(--bgw)','대기':'var(--bgw)','등록':'var(--bgi)'};
const TXM={'해결':'var(--cg)','보류':'var(--cw)','대기':'var(--cw)','등록':'var(--ci)'};

function ocd(l){
  if(OC===l&&!document.getElementById('dp').classList.contains('hidden')){closeDetail();return;}
  OC=l;
  document.querySelectorAll('#ctb tr').forEach(tr=>tr.classList.remove('active'));
  const tr=document.querySelector(`#ctb tr[data-c="${l}"]`);if(tr)tr.classList.add('active');
  document.getElementById('dtitle').textContent=l;
  const b=CB[l];
  document.getElementById('dtabs').innerHTML=['prev','this','remain'].map(k=>
    `<button class="dtab ${k==='prev'?'active':''}" onclick="sdb('${k}',this)">
      ${BL[k]} <span class="cb ${k==='prev'?'cbp':k==='this'?'cbt':'cbr'}" style="margin-left:4px">${b[k].length}</span>
    </button>`
  ).join('');
  sdb2('prev',b['prev']);
  document.getElementById('dp').classList.remove('hidden');
  document.getElementById('dp').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function sdb(k,btn){document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');sdb2(k,CB[OC][k]);}
function sdb2(k,rows){
  document.getElementById('dsub').textContent=` · ${rows.length}건`;
  document.getElementById('dth').innerHTML='<tr><th>제목</th><th>상태</th><th>종료일</th><th>요청일</th></tr>';
  if(!rows.length){document.getElementById('dtb').innerHTML='<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--c3);">해당 건이 없습니다.</td></tr>';return;}
  document.getElementById('dtb').innerHTML=rows.map(r=>{
    const st=(r[ZSC]||'').trim();const bg=BGM[st]||'var(--bg3)',tx=TXM[st]||'var(--cs)';
    return`<tr><td class="tc">${cleanVal(r[ZTC])}</td><td class="dc"><span class="stp" style="background:${bg};color:${tx}">${STATUS_LABEL(st)}</span></td><td class="dc">${gdd(r,ZEC,ZFC)}</td><td class="dc">${gdd(r,ZQC,ZQF)}</td></tr>`;
  }).join('');
}
function closeDetail(){OC=null;document.getElementById('dp').classList.add('hidden');document.querySelectorAll('#ctb tr').forEach(tr=>tr.classList.remove('active'));}

// ── 유틸 ─────────────────────────────────────────────
function fc(cands){for(const c of cands){const f=ZC.find(col=>col.includes(c));if(f)return f;}return null;}
function pd(val){if(!val)return null;const s=String(val).replace(/'/g,'').trim();if(!s||s==='-')return null;const d=new Date(s);return isNaN(d.getTime())?null:d;}
function tds(d){return d.toISOString().slice(0,10);}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function gdd(row,mc,fc2){const m=pd(row[mc]);if(m)return tds(m);const f=pd(row[fc2]);return f?tds(f):'-';}
function gee(row){const m=pd(row[ZEC]);if(m)return m;const f=pd(row[ZFC]);return f?new Date(tds(f)):null;}

function copyTicketTable(){
  // ctb의 tr 중 합계행(trow 클래스)과 헤더 제외, 데이터 행만
  const rows = [...document.querySelectorAll('#ctb tr:not(.trow)')];
  if(!rows.length){ return; }

  // 각 행: 고객사명 | 지난주완료 | 금주예정 | 잔여티켓 (숫자만)
  const lines = rows.map(tr=>{
    const cells = tr.querySelectorAll('td');
    if(!cells.length) return null;
    const site = cells[0]?.innerText.trim();
    // 카운트 배지에서 숫자만 추출
    const getNum = td => {
      const badge = td?.querySelector('.cb');
      return badge ? badge.innerText.trim() : (td?.innerText.trim()||'0');
    };
    const prev   = getNum(cells[2]);
    const thisW  = getNum(cells[3]);
    const remain = getNum(cells[4]);
    return [site, prev, thisW, remain].join('\t');
  }).filter(Boolean);

  const tsv = lines.join('\n');
  const done = () => {
    const t = document.getElementById('ticket-copy-toast');
    t.classList.remove('hidden');
    setTimeout(()=>t.classList.add('hidden'), 2000);
  };
  navigator.clipboard.writeText(tsv).then(done).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=tsv;
    ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  });
}

function stab(id,btn){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');btn.classList.add('active');}
function stab2(id){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');document.getElementById('tab-'+id).classList.add('active');}
function toast(msg){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='margin:8px 0;padding:8px 12px;border-radius:4px;font-size:12px;background:var(--bgw);color:var(--cw);';document.getElementById('panel-zd').prepend(el);}el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),4000);}
function getSysType(sys){const s=(sys||'').trim();if(s.includes('[공유형]')||s.includes('[고우넷]')||s.includes('[고우아이티]'))return'공유형';if(s.includes('[무상]'))return'단독형';return'유상';}
